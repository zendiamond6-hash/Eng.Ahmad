<style>



*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

background:
radial-gradient(circle at top,#2a2a2a,#000);

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;

}

/* ---------- Stars Background ---------- */

.stars,
.stars2,
.shooting-stars{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.stars{
    background-image:
    radial-gradient(2px 2px at 20px 30px,#fff,transparent),
    radial-gradient(2px 2px at 90px 150px,#fff,transparent),
    radial-gradient(1.5px 1.5px at 200px 80px,#fff,transparent),
    radial-gradient(2px 2px at 300px 220px,#fff,transparent),
    radial-gradient(2px 2px at 500px 120px,#fff,transparent),
    radial-gradient(1px 1px at 650px 60px,#fff,transparent),
    radial-gradient(2px 2px at 850px 180px,#fff,transparent),
    radial-gradient(2px 2px at 1000px 320px,#fff,transparent);

    background-size:1200px 700px;

    animation:moveStars 90s linear infinite;
    opacity:.7;
}

.stars2{

    background-image:
    radial-gradient(1px 1px,#fff,transparent);

    background-size:120px 120px;

    animation:moveStars2 160s linear infinite;

    opacity:.3;

}

@keyframes moveStars{

    from{

        transform:translateY(0);

    }

    to{

        transform:translateY(-600px);

    }

}

@keyframes moveStars2{

    from{

        transform:translateX(0);

    }

    to{

        transform:translateX(-500px);

    }

}

/* Twinkle */

.stars::after{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(circle,#fff 0%,transparent 70%);

mix-blend-mode:screen;

opacity:.15;

animation:twinkle 3s ease-in-out infinite alternate;

}

@keyframes twinkle{

from{

opacity:.08;

}

to{

opacity:.22;

}

}

/* Shooting Stars */

.shooting-stars span{

position:absolute;

width:160px;

height:2px;

background:linear-gradient(90deg,#fff,transparent);

border-radius:999px;

opacity:.9;

animation:shoot 5s linear infinite;

}

.shooting-stars span:nth-child(1){

top:12%;
left:-200px;
animation-delay:0s;

}

.shooting-stars span:nth-child(2){

top:35%;
left:-300px;
animation-delay:2.5s;

}

.shooting-stars span:nth-child(3){

top:70%;
left:-250px;
animation-delay:5s;

}

@keyframes shoot{

0%{

transform:
translateX(0)
translateY(0)
rotate(25deg);

opacity:0;

}

10%{

opacity:1;

}

100%{

transform:
translateX(1700px)
translateY(550px)
rotate(25deg);

opacity:0;

}

}
body::before{

content:"";

position:fixed;

width:600px;
height:600px;

background:#d4af37;

filter:blur(220px);

opacity:.15;

top:-250px;
right:-200px;

}

body::after{

content:"";

position:fixed;

width:500px;
height:500px;

background:#ffffff;

filter:blur(200px);

opacity:.05;

bottom:-200px;
left:-150px;

}

.container{

position:relative;

z-index:5;

width:100%;
max-width:430px;

padding:25px;

}

.card{

border-radius:28px;

overflow:hidden;

box-shadow:

0 20px 60px rgba(0,0,0,.45),

0 0 40px rgba(212,175,55,.18);

transition:.35s;

cursor:pointer;

}

.card:hover{

transform:translateY(-8px) scale(1.02);

box-shadow:

0 30px 70px rgba(0,0,0,.55),

0 0 60px rgba(212,175,55,.25);

}

.card img{

display:block;

width:100%;

height:auto;

}

.buttons{

margin-top:28px;

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

}

.btn{

display:flex;

align-items:center;

justify-content:center;

gap:10px;

padding:14px;

border:none;

border-radius:16px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

color:white;

font-size:15px;

text-decoration:none;

transition:.3s;

}

.btn:hover{

background:#d4af37;

color:#000;

transform:translateY(-3px);

}

.footer{

margin-top:28px;

text-align:center;

color:#9b9b9b;

font-size:13px;

}

.modal{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.9);

justify-content:center;

align-items:center;

padding:25px;

z-index:999;

}

.modal img{

max-width:95%;

max-height:95vh;

border-radius:20px;

}

.close{

position:absolute;

top:20px;

left:20px;

color:white;

font-size:35px;

cursor:pointer;

}

.fade{

animation:fade .6s ease;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:none;

}

}

</style>
